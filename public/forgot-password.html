<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — NaijaWorks</title>
  <link rel="stylesheet" href="/css/main.css" />
  <style>
    body { background: var(--charcoal-50); min-height: 100vh; display: flex; flex-direction: column; }
    .auth-page { flex: 1; display: flex; align-items: center; justify-content: center; padding: var(--space-6) var(--space-4); }
    .auth-card { background: white; border-radius: var(--radius-xl); box-shadow: var(--shadow-xl); width: 100%; max-width: 440px; overflow: hidden; }
    .auth-header { background: linear-gradient(135deg, var(--charcoal-900), var(--green-900)); padding: var(--space-8); text-align: center; }
    .auth-header h1 { font-size: 1.5rem; color: white; margin-bottom: 6px; }
    .auth-header p  { color: rgba(255,255,255,0.6); font-size: 0.9375rem; }
    .auth-body { padding: var(--space-8); }
    .auth-nav { background: white; border-bottom: 1px solid var(--border); padding: 0 var(--space-4); height: 60px; display: flex; align-items: center; }
  </style>
</head>
<body>
<nav class="auth-nav">
  <a href="/" class="nav-logo"><div class="nav-logo-icon">N</div>Naija<span>Works</span></a>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div style="font-size:2.5rem;margin-bottom:12px;">🔑</div>
      <h1>Reset Password</h1>
      <p>Enter your email and we'll send you a reset link</p>
    </div>

    <div class="auth-body">
      <div id="auth-error" style="display:none;background:var(--status-error-bg);border:1px solid #fca5a5;border-radius:var(--radius-md);padding:12px 16px;margin-bottom:20px;font-size:0.875rem;color:var(--status-error);"></div>

      <div id="success-msg" style="display:none;background:var(--status-success-bg);border:1px solid #86efac;border-radius:var(--radius-md);padding:16px;margin-bottom:20px;text-align:center;">
        <div style="font-size:1.75rem;margin-bottom:8px;">📧</div>
        <div style="font-weight:700;color:var(--status-success);margin-bottom:4px;">Check your inbox!</div>
        <div style="font-size:0.875rem;color:var(--text-secondary);">We've sent a password reset link to <strong id="sent-to-email"></strong>. Check spam if you don't see it.</div>
      </div>

      <form id="reset-form">
        <div class="form-group">
          <label class="form-label" for="email">Email Address <span class="required">*</span></label>
          <input type="email" id="email" class="form-input" placeholder="you@example.com" autocomplete="email" required />
          <span class="form-error" id="email-error">Please enter a valid email</span>
        </div>
        <button type="submit" id="reset-btn" class="btn btn-primary btn-full btn-lg">Send Reset Link</button>
      </form>

      <div style="text-align:center;margin-top:24px;">
        <a href="/login.html" style="font-size:0.9375rem;color:var(--text-muted);">← Back to Login</a>
      </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="/js/config.js"></script>
<script>firebase.initializeApp(NaijaWorksConfig.firebase);</script>
<script src="/js/main.js"></script>
<script>
document.getElementById('reset-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const btn = document.getElementById('reset-btn');
  const errorEl = document.getElementById('auth-error');
  errorEl.style.display = 'none';

  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    showFieldError('email', 'Please enter a valid email address');
    return;
  }

  setButtonLoading(btn, true, 'Sending…');
  try {
    await firebase.auth().sendPasswordResetEmail(email, {
      url: `${NaijaWorksConfig.app.baseUrl}/login.html`,
    });
    document.getElementById('reset-form').style.display = 'none';
    document.getElementById('sent-to-email').textContent = email;
    document.getElementById('success-msg').style.display = 'block';
  } catch (err) {
    setButtonLoading(btn, false);
    const msgs = {
      'auth/user-not-found': 'No account found with this email.',
      'auth/invalid-email':  'Please enter a valid email address.',
      'auth/too-many-requests': 'Too many requests. Please try again later.',
    };
    errorEl.textContent = msgs[err.code] || 'Failed to send reset email. Please try again.';
    errorEl.style.display = 'block';
  }
});
</script>
</body>
</html>
