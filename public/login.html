<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In — NaijaWorks</title>
  <link rel="stylesheet" href="/css/main.css" />
  <style>
    body { background: var(--charcoal-50); min-height: 100vh; display: flex; flex-direction: column; }
    .auth-page { flex: 1; display: flex; align-items: center; justify-content: center; padding: var(--space-6) var(--space-4); }
    .auth-card {
      background: white;
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-xl);
      width: 100%;
      max-width: 440px;
      overflow: hidden;
    }
    .auth-header {
      background: linear-gradient(135deg, var(--charcoal-900), var(--green-900));
      padding: var(--space-8) var(--space-8) var(--space-6);
      text-align: center;
    }
    .auth-logo {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1.375rem;
      color: white;
      text-decoration: none;
      margin-bottom: var(--space-5);
    }
    .auth-logo-icon { width: 36px; height: 36px; background: var(--primary); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
    .auth-header h1 { font-size: 1.5rem; color: white; margin-bottom: 6px; }
    .auth-header p  { color: rgba(255,255,255,0.6); font-size: 0.9375rem; }
    .auth-body { padding: var(--space-8); }
    .auth-footer {
      text-align: center;
      padding: var(--space-5) var(--space-8);
      border-top: 1px solid var(--border);
      font-size: 0.9375rem;
      color: var(--text-secondary);
      background: var(--charcoal-50);
    }
    .auth-footer a { color: var(--primary); font-weight: 600; }
    .password-wrap { position: relative; }
    .password-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1rem;
      padding: 4px;
    }
    .divider-text {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin: var(--space-6) 0;
      color: var(--text-muted);
      font-size: 0.875rem;
    }
    .divider-text::before,
    .divider-text::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .auth-nav { background: white; border-bottom: 1px solid var(--border); padding: 0 var(--space-4); height: 60px; display: flex; align-items: center; }
  </style>
</head>
<body>

<nav class="auth-nav">
  <a href="/" class="nav-logo">
    <div class="nav-logo-icon">N</div>
    Naija<span>Works</span>
  </a>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <h1>Welcome Back</h1>
      <p>Log in to your NaijaWorks account</p>
    </div>

    <div class="auth-body">
      <!-- Error alert -->
      <div id="auth-error" style="display:none;background:var(--status-error-bg);border:1px solid #fca5a5;border-radius:var(--radius-md);padding:12px 16px;margin-bottom:20px;font-size:0.875rem;color:var(--status-error);"></div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Email Address <span class="required">*</span></label>
          <input type="email" id="email" class="form-input" placeholder="you@example.com" autocomplete="email" required />
          <span class="form-error" id="email-error">Please enter a valid email</span>
        </div>

        <div class="form-group">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
            <label class="form-label" for="password" style="margin-bottom:0;">Password <span class="required">*</span></label>
            <a href="/forgot-password.html" style="font-size:0.8125rem;color:var(--primary);font-weight:600;">Forgot password?</a>
          </div>
          <div class="password-wrap">
            <input type="password" id="password" class="form-input" placeholder="Enter your password" autocomplete="current-password" required />
            <button type="button" class="password-toggle" id="toggle-password" aria-label="Show password">👁</button>
          </div>
          <span class="form-error" id="password-error">Password is required</span>
        </div>

        <div style="display:flex;align-items:center;gap:10px;margin-bottom:24px;">
          <input type="checkbox" id="remember" style="width:18px;height:18px;accent-color:var(--primary);cursor:pointer;" />
          <label for="remember" style="font-size:0.9rem;color:var(--text-secondary);cursor:pointer;">Remember me</label>
        </div>

        <button type="submit" id="login-btn" class="btn btn-primary btn-full btn-lg">
          Log In
        </button>
      </form>

      <div class="divider-text">or continue with</div>

      <button id="google-btn" class="btn btn-ghost btn-full" style="gap:10px;justify-content:center;">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 7.9 2.9l5.7-5.7C34 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.9z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 16.1 19 13 24 13c3.1 0 5.8 1.1 7.9 2.9l5.7-5.7C34 6.5 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.1l-6.2-5.2C29.3 35.4 26.8 36 24 36c-5.3 0-9.7-3.3-11.3-8H6.1C9.4 37.8 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-1 2.7-2.7 5-4.9 6.6l6.2 5.2C36.9 39.6 44 35 44 24c0-1.3-.1-2.7-.4-3.9z"/></svg>
        Continue with Google
      </button>
    </div>

    <div class="auth-footer">
      Don't have an account? <a href="/signup.html">Sign up free</a>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="/js/config.js"></script>
<script>
  firebase.initializeApp(NaijaWorksConfig.firebase);
</script>
<script src="/js/main.js"></script>
<script>
// Redirect if already logged in
redirectIfLoggedIn();

const loginForm   = document.getElementById('login-form');
const loginBtn    = document.getElementById('login-btn');
const googleBtn   = document.getElementById('google-btn');
const authError   = document.getElementById('auth-error');
const togglePwBtn = document.getElementById('toggle-password');

function showAuthError(msg) {
  authError.textContent = msg;
  authError.style.display = 'block';
}
function hideAuthError() {
  authError.style.display = 'none';
}

// Toggle password visibility
togglePwBtn.addEventListener('click', () => {
  const pwInput = document.getElementById('password');
  if (pwInput.type === 'password') {
    pwInput.type = 'text';
    togglePwBtn.textContent = '🙈';
  } else {
    pwInput.type = 'password';
    togglePwBtn.textContent = '👁';
  }
});

// Email/password login
loginForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  hideAuthError();
  clearAllErrors(loginForm);

  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  let valid = true;
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    showFieldError('email', 'Please enter a valid email address');
    valid = false;
  }
  if (!password) {
    showFieldError('password', 'Password is required');
    valid = false;
  }
  if (!valid) return;

  setButtonLoading(loginBtn, true, 'Logging in...');

  try {
    const userCred = await firebase.auth().signInWithEmailAndPassword(email, password);
    const idToken  = await userCred.user.getIdToken();

    // Notify server to update lastLoginAt
    const res = await fetch('/api/v1/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ idToken }),
    });

    const data = await res.json();

    if (!res.ok) {
      await firebase.auth().signOut();
      showAuthError(data.message || 'Login failed. Please try again.');
      setButtonLoading(loginBtn, false);
      return;
    }

    // Redirect based on role
    const role = data.user?.role;
    window.location.href = role === 'worker' ? '/worker-dashboard.html' : '/client-dashboard.html';

  } catch (err) {
    setButtonLoading(loginBtn, false);
    const firebaseErrors = {
      'auth/user-not-found':      'No account found with this email. Please sign up.',
      'auth/wrong-password':      'Incorrect password. Please try again.',
      'auth/invalid-credential':  'Incorrect email or password.',
      'auth/too-many-requests':   'Too many failed attempts. Please try again later.',
      'auth/user-disabled':       'Your account has been disabled. Contact support.',
      'auth/network-request-failed': 'Network error. Check your internet connection.',
    };
    showAuthError(firebaseErrors[err.code] || 'Login failed. Please try again.');
  }
});

// Google Sign-In
googleBtn.addEventListener('click', async () => {
  hideAuthError();
  setButtonLoading(googleBtn, true, 'Connecting...');

  try {
    const provider = new firebase.auth.GoogleAuthProvider();
    const result   = await firebase.auth().signInWithPopup(provider);
    const idToken  = await result.user.getIdToken();

    // Check if user exists in our system
    const checkRes = await fetch('/api/v1/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ idToken }),
    });

    const checkData = await checkRes.json();

    if (checkRes.status === 404) {
      // New Google user — go to signup to pick role
      window.location.href = `/signup.html?google=true&token=${encodeURIComponent(idToken)}`;
      return;
    }

    if (!checkRes.ok) {
      showAuthError(checkData.message || 'Login failed');
      setButtonLoading(googleBtn, false);
      return;
    }

    const role = checkData.user?.role;
    window.location.href = role === 'worker' ? '/worker-dashboard.html' : '/client-dashboard.html';

  } catch (err) {
    setButtonLoading(googleBtn, false);
    if (err.code === 'auth/popup-closed-by-user') return;
    showAuthError('Google sign-in failed. Please try again.');
  }
});
</script>
</body>
</html>
