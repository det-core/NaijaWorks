<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Withdrawals — NaijaWorks Admin</title>
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/dashboard.css" />
  <style>.admin-sidebar{background:#0d0f1a;}</style>
</head>
<body>
<div class="dash-layout">
  <aside class="dash-sidebar admin-sidebar" id="dash-sidebar">
    <a href="/" class="sidebar-logo"><div class="sidebar-logo-icon">N</div>Naija<span>Works</span></a>
    <nav class="sidebar-nav">
      <a href="/admin-dashboard.html"   class="sidebar-link"><span class="icon">📊</span>Dashboard</a>
      <a href="/admin-users.html"       class="sidebar-link"><span class="icon">👥</span>Users</a>
      <a href="/admin-jobs.html"        class="sidebar-link"><span class="icon">💼</span>Jobs</a>
      <a href="/admin-withdrawals.html" class="sidebar-link active"><span class="icon">🏦</span>Withdrawals</a>
      <a href="/admin-disputes.html"    class="sidebar-link"><span class="icon">⚖️</span>Disputes</a>
      <a href="/admin-payments.html"    class="sidebar-link"><span class="icon">💳</span>Payments</a>
      <a href="/admin-wallets.html"     class="sidebar-link"><span class="icon">💰</span>Wallets</a>
      <a href="/admin-categories.html"  class="sidebar-link"><span class="icon">📋</span>Categories</a>
      <a href="/admin-settings.html"    class="sidebar-link"><span class="icon">⚙️</span>Settings</a>
    </nav>
    <div class="sidebar-bottom">
      <div class="sidebar-user"><div class="sidebar-user-avatar" id="sidebar-user-avatar"></div>
        <div><div class="sidebar-user-name" id="sidebar-user-name">Admin</div><div class="sidebar-user-role" style="color:#ef4444;">Administrator</div></div>
      </div>
      <a class="sidebar-link" href="#" data-logout><span class="icon">🚪</span>Log Out</a>
    </div>
  </aside>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <main class="dash-main">
    <div class="dash-topbar">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="topbar-hamburger" id="topbar-hamburger"><span></span><span></span><span></span></button>
        <span class="topbar-title">Withdrawals</span>
      </div>
    </div>

    <div class="dash-content">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:20px;">
        <div><div class="page-title">Withdrawals</div><div class="page-subtitle">Process and manage worker withdrawal requests</div></div>
        <div style="display:flex;gap:8px;">
          <select id="status-filter" class="form-select" style="width:auto;min-height:40px;" onchange="loadWithdrawals()">
            <option value="all">All</option>
            <option value="pending" selected>Pending</option>
            <option value="completed">Completed</option>
            <option value="failed">Failed / Rejected</option>
          </select>
          <button onclick="loadWithdrawals()" class="btn btn-ghost btn-sm">🔄 Refresh</button>
        </div>
      </div>

      <!-- Stats -->
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px;">
        <div class="stat-card">
          <div class="stat-icon" style="background:#fef9c3;">⏳</div>
          <div class="stat-label">Pending</div>
          <div class="stat-value" id="stat-pending">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:#dcfce7;">✅</div>
          <div class="stat-label">Completed</div>
          <div class="stat-value" id="stat-completed">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:#fee2e2;">❌</div>
          <div class="stat-label">Failed</div>
          <div class="stat-value" id="stat-failed">—</div>
        </div>
      </div>

      <div class="card">
        <div class="data-table-wrap">
          <table class="data-table">
            <thead>
              <tr><th>Worker</th><th>Amount</th><th>Fee</th><th>Net</th><th>Bank</th><th>Account</th><th>Requested</th><th>Status</th><th>Actions</th></tr>
            </thead>
            <tbody id="withdrawals-tbody">
              <tr><td colspan="9" style="text-align:center;padding:32px;"><div class="spinner dark" style="margin:0 auto 12px;"></div>Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="/js/config.js"></script>
<script>firebase.initializeApp(NaijaWorksConfig.firebase);</script>
<script src="/js/main.js"></script>
<script src="/js/dashboard.js"></script>
<script>
let allWithdrawals = [];

async function loadWithdrawals() {
  const tbody  = document.getElementById('withdrawals-tbody');
  const status = document.getElementById('status-filter').value;
  tbody.innerHTML = `<tr><td colspan="9" style="text-align:center;padding:32px;"><div class="spinner dark" style="margin:0 auto 12px;"></div>Loading…</td></tr>`;
  try {
    const data = await api.get(`/api/v1/admin/withdrawals?status=${status}`);
    allWithdrawals = data.withdrawals || [];

    // Stats
    const pending   = allWithdrawals.filter(w => w.status === 'pending').length;
    const completed = allWithdrawals.filter(w => w.status === 'completed').length;
    const failed    = allWithdrawals.filter(w => w.status === 'failed').length;
    document.getElementById('stat-pending').textContent   = pending;
    document.getElementById('stat-completed').textContent = completed;
    document.getElementById('stat-failed').textContent    = failed;

    if (!allWithdrawals.length) {
      tbody.innerHTML = `<tr><td colspan="9" style="text-align:center;padding:32px;color:var(--text-muted);">No withdrawals found</td></tr>`;
      return;
    }

    const statusStyles = { pending:'status-pending', completed:'status-completed', failed:'status-cancelled', processing:'status-funded' };

    tbody.innerHTML = allWithdrawals.map(w => `
      <tr>
        <td style="font-weight:600;">${w.accountName || '—'}<div style="font-size:0.75rem;color:var(--text-muted);">${w.uid?.slice(0,8)}…</div></td>
        <td style="font-weight:700;">${formatNaira(w.amount)}</td>
        <td style="color:var(--status-error);">-${formatNaira(w.fee)}</td>
        <td style="font-weight:700;color:var(--status-success);">${formatNaira(w.netAmount)}</td>
        <td>${w.bankName || '—'}</td>
        <td style="font-family:monospace;">${w.accountNumber || '—'}</td>
        <td>${formatDate(w.requestedAt)}</td>
        <td><span class="status-pill ${statusStyles[w.status] || 'status-draft'}">${w.status}</span></td>
        <td>
          ${w.status === 'pending' ? `
            <div style="display:flex;gap:6px;">
              <button class="btn btn-primary btn-sm" onclick="approve('${w.id}')">✓ Approve</button>
              <button class="btn btn-ghost btn-sm" style="color:var(--status-error);" onclick="reject('${w.id}')">✕ Reject</button>
            </div>` : `<span style="font-size:0.8rem;color:var(--text-muted);">${w.notes || '—'}</span>`}
        </td>
      </tr>`).join('');
  } catch(e) {
    tbody.innerHTML = `<tr><td colspan="9" style="text-align:center;padding:24px;color:var(--status-error);">Failed to load</td></tr>`;
  }
}

async function approve(id) {
  if (!confirm('Approve this withdrawal? Make sure payment has been sent to the worker\'s bank.')) return;
  try {
    await api.patch(`/api/v1/admin/withdrawals/${id}/approve`, { notes: 'Manually approved by admin' });
    showToast('Withdrawal approved!', 'success');
    loadWithdrawals();
  } catch(e) { showToast(e.message, 'error'); }
}

async function reject(id) {
  const reason = prompt('Reason for rejection (will be sent to worker):');
  if (reason === null) return;
  try {
    await api.patch(`/api/v1/admin/withdrawals/${id}/reject`, { reason });
    showToast('Withdrawal rejected and funds refunded to wallet', 'info');
    loadWithdrawals();
  } catch(e) { showToast(e.message, 'error'); }
}

(async () => {
  await initDashboard('admin');
  const urlStatus = new URLSearchParams(window.location.search).get('status');
  if (urlStatus) document.getElementById('status-filter').value = urlStatus;
  loadWithdrawals();
})();
</script>
</body>
</html>
