<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Jobs — NaijaWorks</title>
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/dashboard.css" />
</head>
<body>
<div class="dash-layout">
  <aside class="dash-sidebar" id="dash-sidebar">
    <a href="/" class="sidebar-logo"><div class="sidebar-logo-icon">N</div>Naija<span>Works</span></a>
    <nav class="sidebar-nav">
      <a href="/client-dashboard.html" class="sidebar-link"><span class="icon">🏠</span>Dashboard</a>
      <a href="/browse-workers.html"   class="sidebar-link"><span class="icon">🔍</span>Find Workers</a>
      <a href="/client-jobs.html"      class="sidebar-link active"><span class="icon">💼</span>My Jobs</a>
      <a href="/offers.html"           class="sidebar-link"><span class="icon">🤝</span>Offers</a>
      <a href="/contracts.html"        class="sidebar-link"><span class="icon">📄</span>Contracts</a>
      <a href="/wallet.html"           class="sidebar-link"><span class="icon">💰</span>Payments</a>
      <a href="/edit-profile.html"     class="sidebar-link"><span class="icon">⚙️</span>Settings</a>
    </nav>
    <div class="sidebar-bottom">
      <div class="sidebar-user"><div class="sidebar-user-avatar" id="sidebar-user-avatar"></div>
        <div><div class="sidebar-user-name" id="sidebar-user-name">Loading…</div><div class="sidebar-user-role" id="sidebar-user-role">Client</div></div>
      </div>
      <a class="sidebar-link" href="#" data-logout><span class="icon">🚪</span>Log Out</a>
    </div>
  </aside>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <main class="dash-main">
    <div class="dash-topbar">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="topbar-hamburger" id="topbar-hamburger"><span></span><span></span><span></span></button>
        <span class="topbar-title">My Jobs</span>
      </div>
      <div class="topbar-right">
        <button class="btn btn-primary btn-sm" onclick="openPostModal()">+ Post a Job</button>
        <button class="notif-btn" id="notif-btn">🔔<span class="notif-dot" id="notif-dot" style="display:none"></span></button>
      </div>
    </div>
    <div class="notif-panel" id="notif-panel"><div class="notif-panel-header">Notifications</div><div class="notif-list"></div></div>

    <div class="dash-content">
      <div class="page-title">My Jobs</div>
      <div class="page-subtitle">Post and manage your job listings</div>

      <div class="tab-bar" style="margin-bottom:24px;">
        <button class="tab-btn active" onclick="switchTab('all',this)">All</button>
        <button class="tab-btn" onclick="switchTab('open',this)">Open</button>
        <button class="tab-btn" onclick="switchTab('in_progress',this)">In Progress</button>
        <button class="tab-btn" onclick="switchTab('completed',this)">Completed</button>
        <button class="tab-btn" onclick="switchTab('cancelled',this)">Cancelled</button>
      </div>

      <div id="jobs-list" style="display:flex;flex-direction:column;gap:16px;"></div>
    </div>
  </main>
</div>

<!-- Post Job Modal -->
<div class="overlay" id="post-modal">
  <div class="modal" style="max-width:580px;">
    <div class="modal-header">
      <span class="modal-title" id="post-modal-title">Post a Job</span>
      <button class="modal-close" onclick="closePostModal()">✕</button>
    </div>
    <div class="modal-body">
      <div id="post-error" style="display:none;background:var(--status-error-bg);border:1px solid #fca5a5;border-radius:var(--radius-md);padding:12px 16px;margin-bottom:16px;font-size:0.875rem;color:var(--status-error);"></div>
      <div class="form-group">
        <label class="form-label">Job Title <span class="required">*</span></label>
        <input type="text" id="job-title" class="form-input" placeholder="e.g. Need a plumber for bathroom leak" />
      </div>
      <div class="form-group">
        <label class="form-label">Description <span class="required">*</span></label>
        <textarea id="job-desc" class="form-input" rows="4" placeholder="Describe the job in detail — what needs to be done, when, any specific requirements…"></textarea>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <div class="form-group">
          <label class="form-label">Category <span class="required">*</span></label>
          <select id="job-category" class="form-select">
            <option value="">Select category</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Work Mode <span class="required">*</span></label>
          <select id="job-workmode" class="form-select">
            <option value="physical">Physical / Local</option>
            <option value="remote">Remote / Online</option>
          </select>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <div class="form-group">
          <label class="form-label">Budget (₦) <span class="required">*</span></label>
          <input type="number" id="job-budget" class="form-input" placeholder="e.g. 20000" min="500" />
        </div>
        <div class="form-group">
          <label class="form-label">Duration</label>
          <input type="text" id="job-duration" class="form-input" placeholder="e.g. 1 day, 2 weeks" />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Location</label>
        <input type="text" id="job-location" class="form-input" placeholder="e.g. Victoria Island, Lagos" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closePostModal()">Cancel</button>
      <button class="btn btn-primary" id="post-job-btn" onclick="submitJob()">Post Job</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="/js/config.js"></script>
<script>firebase.initializeApp(NaijaWorksConfig.firebase);</script>
<script src="/js/main.js"></script>
<script src="/js/dashboard.js"></script>
<script>
let currentTab = 'all';
let editingJobId = null;

// Populate category select
const catSelect = document.getElementById('job-category');
[...NaijaWorksConfig.categories.physical, ...NaijaWorksConfig.categories.remote].forEach(c => {
  catSelect.innerHTML += `<option value="${c.id}">${c.icon} ${c.label}</option>`;
});

function openPostModal(job = null) {
  editingJobId = job?.id || null;
  document.getElementById('post-modal-title').textContent = job ? 'Edit Job' : 'Post a Job';
  document.getElementById('post-error').style.display = 'none';
  document.getElementById('job-title').value    = job?.title    || '';
  document.getElementById('job-desc').value     = job?.description || '';
  document.getElementById('job-category').value = job?.category || '';
  document.getElementById('job-workmode').value = job?.workMode || 'physical';
  document.getElementById('job-budget').value   = job?.budget   || '';
  document.getElementById('job-duration').value = job?.duration || '';
  document.getElementById('job-location').value = job?.location || '';
  document.getElementById('post-modal').classList.add('open');
}

function closePostModal() {
  document.getElementById('post-modal').classList.remove('open');
  editingJobId = null;
}

function switchTab(status, btn) {
  currentTab = status;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadJobs();
}

async function loadJobs() {
  const listEl = document.getElementById('jobs-list');
  listEl.innerHTML = `<div style="text-align:center;padding:40px;"><div class="spinner dark" style="margin:0 auto 12px;"></div>Loading…</div>`;
  try {
    const status = currentTab === 'all' ? '' : currentTab;
    const token  = await getAuthToken();
    const res    = await fetch(`/api/v1/jobs?role=client${status ? '&status=' + status : ''}&limit=30`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    const data = await res.json();
    const jobs = data.jobs || [];

    if (!jobs.length) {
      listEl.innerHTML = `<div class="empty-state">
        <div class="empty-state-icon">💼</div>
        <div class="empty-state-title">No ${currentTab === 'all' ? '' : currentTab + ' '}jobs yet</div>
        <div class="empty-state-desc">Post a job to start receiving offers from workers.</div>
        <button class="btn btn-primary" onclick="openPostModal()">+ Post Your First Job</button>
      </div>`;
      return;
    }

    const statusMap = { open:'status-active', in_progress:'status-funded', completed:'status-completed', cancelled:'status-cancelled' };

    listEl.innerHTML = jobs.map(j => `
      <div class="card">
        <div style="padding:20px 24px;">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:12px;">
            <div>
              <div style="font-weight:700;font-size:1.0625rem;font-family:var(--font-display);">${j.title}</div>
              <div style="font-size:0.8125rem;color:var(--text-muted);margin-top:4px;">
                ${j.category ? `<span class="badge badge-gray" style="font-size:0.7rem;">${j.category}</span>` : ''}
                <span style="margin-left:6px;">${j.workMode === 'remote' ? '💻 Remote' : '📍 Physical'}</span>
                ${j.location ? ` · ${j.location}` : ''}
              </div>
            </div>
            <div style="text-align:right;">
              <div style="font-size:1.25rem;font-weight:800;font-family:var(--font-display);color:var(--primary);">${formatNaira(j.budget)}</div>
              <span class="status-pill ${statusMap[j.status] || 'status-draft'}">${j.status.replace('_',' ')}</span>
            </div>
          </div>
          <p style="font-size:0.9rem;color:var(--text-secondary);margin-bottom:12px;">${truncate(j.description, 150)}</p>
          <div style="font-size:0.8rem;color:var(--text-muted);">Posted ${timeAgo(j.createdAt)}${j.duration ? ' · ' + j.duration : ''}</div>
        </div>
        <div style="padding:12px 24px;border-top:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;">
          ${j.status === 'open' ? `
            <button class="btn btn-ghost btn-sm" onclick='openPostModal(${JSON.stringify(j).replace(/'/g,"\\'")} )'>✏️ Edit</button>
            <a href="/browse-workers.html?category=${j.category}" class="btn btn-secondary btn-sm">🔍 Find Workers</a>
            <button class="btn btn-ghost btn-sm" style="color:var(--status-error);" onclick="cancelJob('${j.id}')">Cancel</button>
          ` : ''}
          ${j.status === 'in_progress' ? `<a href="/contracts.html" class="btn btn-primary btn-sm">View Contract →</a>` : ''}
          ${j.status === 'completed' ? `<span style="color:var(--status-success);font-size:0.875rem;font-weight:600;">✅ Completed</span>` : ''}
        </div>
      </div>`).join('');
  } catch(e) {
    listEl.innerHTML = `<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-title">Failed to load</div><button class="btn btn-ghost" onclick="loadJobs()">Retry</button></div>`;
  }
}

async function submitJob() {
  const errEl = document.getElementById('post-error');
  errEl.style.display = 'none';

  const title    = document.getElementById('job-title').value.trim();
  const desc     = document.getElementById('job-desc').value.trim();
  const category = document.getElementById('job-category').value;
  const workMode = document.getElementById('job-workmode').value;
  const budget   = parseFloat(document.getElementById('job-budget').value);
  const duration = document.getElementById('job-duration').value.trim();
  const location = document.getElementById('job-location').value.trim();

  if (!title || !desc || !category || !budget || budget < 500) {
    errEl.textContent = 'Please fill in all required fields. Minimum budget: ₦500.';
    errEl.style.display = 'block';
    return;
  }

  const btn = document.getElementById('post-job-btn');
  setButtonLoading(btn, true, editingJobId ? 'Saving…' : 'Posting…');

  try {
    if (editingJobId) {
      await api.patch(`/api/v1/jobs/${editingJobId}`, { title, description: desc, budget, duration, location });
      showToast('Job updated!', 'success');
    } else {
      await api.post('/api/v1/jobs', { title, description: desc, category, workMode, budget, duration, location });
      showToast('Job posted! Workers can now see it.', 'success');
    }
    closePostModal();
    loadJobs();
  } catch(e) {
    errEl.textContent = e.message || 'Failed';
    errEl.style.display = 'block';
    setButtonLoading(btn, false);
  }
}

async function cancelJob(id) {
  if (!confirm('Cancel this job? This cannot be undone.')) return;
  try {
    await api.patch(`/api/v1/jobs/${id}`, { status: 'cancelled' });
    showToast('Job cancelled', 'info');
    loadJobs();
  } catch(e) { showToast(e.message, 'error'); }
}

// Auto-open post modal from URL
if (new URLSearchParams(window.location.search).get('action') === 'post') {
  window.addEventListener('load', () => openPostModal());
}

(async () => {
  await initDashboard('client');
  loadJobs();
})();
</script>
</body>
</html>
