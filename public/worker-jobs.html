<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Jobs — NaijaWorks</title>
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/dashboard.css" />
</head>
<body>
<div class="dash-layout">
  <aside class="dash-sidebar" id="dash-sidebar">
    <a href="/" class="sidebar-logo"><div class="sidebar-logo-icon">N</div>Naija<span>Works</span></a>
    <nav class="sidebar-nav">
      <a href="/worker-dashboard.html" class="sidebar-link"><span class="icon">🏠</span>Dashboard</a>
      <a href="/worker-profile.html"   class="sidebar-link"><span class="icon">👤</span>My Profile</a>
      <a href="/worker-jobs.html"      class="sidebar-link active"><span class="icon">💼</span>My Jobs</a>
      <a href="/offers.html"           class="sidebar-link"><span class="icon">🤝</span>Offers</a>
      <a href="/contracts.html"        class="sidebar-link"><span class="icon">📄</span>Contracts</a>
      <a href="/wallet.html"           class="sidebar-link"><span class="icon">💰</span>Wallet</a>
      <a href="/withdrawals.html"      class="sidebar-link"><span class="icon">🏦</span>Withdrawals</a>
      <a href="/vip-upgrade.html"      class="sidebar-link"><span class="icon">⭐</span>Go VIP</a>
      <a href="/notifications.html"    class="sidebar-link"><span class="icon">🔔</span>Notifications</a>
      <a href="/edit-profile.html"     class="sidebar-link"><span class="icon">⚙️</span>Settings</a>
    </nav>
    <div class="sidebar-bottom">
      <div class="sidebar-user">
        <div class="sidebar-user-avatar" id="sidebar-user-avatar"></div>
        <div><div class="sidebar-user-name" id="sidebar-user-name">Loading…</div><div class="sidebar-user-role" id="sidebar-user-role">Worker</div></div>
      </div>
      <a class="sidebar-link" href="#" data-logout><span class="icon">🚪</span>Log Out</a>
    </div>
  </aside>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <main class="dash-main">
    <div class="dash-topbar">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="topbar-hamburger" id="topbar-hamburger"><span></span><span></span><span></span></button>
        <span class="topbar-title">My Jobs</span>
      </div>
      <div class="topbar-right">
        <button class="notif-btn" id="notif-btn">🔔<span class="notif-dot" id="notif-dot" style="display:none"></span></button>
      </div>
    </div>
    <div class="notif-panel" id="notif-panel"><div class="notif-panel-header">Notifications</div><div class="notif-list"></div></div>

    <div class="dash-content">
      <div class="page-title">My Jobs</div>
      <div class="page-subtitle">All jobs assigned to you</div>

      <!-- Stats row -->
      <div class="stats-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:24px;">
        <div class="stat-card">
          <div class="stat-icon" style="background:#dbeafe;">🔄</div>
          <div class="stat-label">Active</div>
          <div class="stat-value" id="stat-active">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:#dcfce7;">✅</div>
          <div class="stat-label">Completed</div>
          <div class="stat-value" id="stat-completed">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:var(--green-50);">⭐</div>
          <div class="stat-label">Rating</div>
          <div class="stat-value" id="stat-rating">—</div>
        </div>
      </div>

      <div class="tab-bar" style="margin-bottom:24px;">
        <button class="tab-btn active" onclick="switchTab('all',this)">All</button>
        <button class="tab-btn" onclick="switchTab('in_progress',this)">Active</button>
        <button class="tab-btn" onclick="switchTab('work_done',this)">Work Done</button>
        <button class="tab-btn" onclick="switchTab('completed',this)">Completed</button>
      </div>

      <div id="jobs-list" style="display:flex;flex-direction:column;gap:16px;"></div>
    </div>
  </main>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="/js/config.js"></script>
<script>firebase.initializeApp(NaijaWorksConfig.firebase);</script>
<script src="/js/main.js"></script>
<script src="/js/dashboard.js"></script>
<script>
let currentTab = 'all';

function switchTab(status, btn) {
  currentTab = status;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadJobs();
}

async function loadJobs() {
  const listEl = document.getElementById('jobs-list');
  listEl.innerHTML = `<div style="text-align:center;padding:40px;"><div class="spinner dark" style="margin:0 auto 12px;"></div>Loading…</div>`;
  try {
    const token = await getAuthToken();
    const status = currentTab === 'all' ? '' : currentTab;
    const res = await fetch(`/api/v1/jobs?role=worker${status ? '&status='+status : ''}&limit=30`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    const data = await res.json();
    const jobs = data.jobs || [];

    if (!jobs.length) {
      listEl.innerHTML = `<div class="empty-state">
        <div class="empty-state-icon">💼</div>
        <div class="empty-state-title">No jobs yet</div>
        <div class="empty-state-desc">Accept offers to get your first job. Browse open offers or complete your profile so clients can find you.</div>
        <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
          <a href="/offers.html" class="btn btn-primary">View Offers</a>
          <a href="/edit-profile.html" class="btn btn-secondary">Complete Profile</a>
        </div>
      </div>`;
      return;
    }

    const statusMap = {
      in_progress: 'status-funded', work_done: 'status-pending',
      completed: 'status-completed', cancelled: 'status-cancelled', open: 'status-active'
    };

    listEl.innerHTML = jobs.map(j => `
      <div class="card">
        <div style="padding:20px 24px;">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:12px;">
            <div>
              <div style="font-weight:700;font-size:1.0625rem;font-family:var(--font-display);">${j.title}</div>
              <div style="font-size:0.8125rem;color:var(--text-muted);margin-top:4px;">
                👤 Client · ${j.workMode === 'remote' ? '💻 Remote' : '📍 Physical'}
                ${j.location ? ' · ' + j.location : ''}
              </div>
            </div>
            <div style="text-align:right;">
              <div style="font-size:1.25rem;font-weight:800;font-family:var(--font-display);color:var(--primary);">${formatNaira(j.budget)}</div>
              <span class="status-pill ${statusMap[j.status] || 'status-draft'}">${j.status.replace('_',' ')}</span>
            </div>
          </div>
          <p style="font-size:0.9rem;color:var(--text-secondary);margin-bottom:12px;">${truncate(j.description||'', 150)}</p>
          <div style="font-size:0.8rem;color:var(--text-muted);">Posted ${timeAgo(j.createdAt)}${j.duration ? ' · ' + j.duration : ''}</div>
        </div>
        <div style="padding:12px 24px;border-top:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;">
          <a href="/contracts.html" class="btn btn-ghost btn-sm">View Contract →</a>
          ${j.status === 'in_progress' ? `<button class="btn btn-secondary btn-sm" onclick="markDone('${j.id}')">✅ Mark Work Done</button>` : ''}
        </div>
      </div>`).join('');
  } catch(e) {
    listEl.innerHTML = `<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-title">Failed to load</div><button class="btn btn-ghost" onclick="loadJobs()">Retry</button></div>`;
  }
}

async function markDone(jobId) {
  // Find contract for this job and mark it done
  try {
    const token = await getAuthToken();
    const res = await fetch(`/api/v1/jobs/${jobId}`, { headers: { 'Authorization': `Bearer ${token}` } });
    const data = await res.json();
    showToast('Please use the Contracts page to mark work as done', 'info');
    setTimeout(() => window.location.href = '/contracts.html', 1500);
  } catch(e) { showToast('Please use Contracts page', 'info'); }
}

(async () => {
  await initDashboard('worker');
  document.getElementById('stat-completed').textContent = dashUser.completedJobsCount || 0;
  document.getElementById('stat-rating').textContent = dashUser.ratingAverage ? dashUser.ratingAverage.toFixed(1) + ' ★' : 'N/A';

  // Active jobs count
  try {
    const token = await getAuthToken();
    const res = await fetch('/api/v1/jobs?role=worker&status=in_progress&limit=1', { headers: { 'Authorization': `Bearer ${token}` } });
    const data = await res.json();
    document.getElementById('stat-active').textContent = data.total || data.jobs?.length || 0;
  } catch(e) { document.getElementById('stat-active').textContent = '0'; }

  loadJobs();
})();
</script>
</body>
</html>
